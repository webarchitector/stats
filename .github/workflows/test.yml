name: Test
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          sw_vers
          xcrun --show-sdk-path --sdk macosx
          xcodebuild -showdestinations -project Stats.xcodeproj -scheme Stats 2>&1 | head -40 || true
          security find-identity -v -p codesigning 2>&1 || true

      # Project pins DEVELOPMENT_TEAM=RP2S87B72W + CODE_SIGN_STYLE=Automatic;
      # CI has no Apple Developer cert. Mirror `make local`: clear the team,
      # switch to Manual style, disable signing entirely. Without these
      # overrides, Xcode tries to resolve provisioning for the pinned team
      # and `xcodebuild build` exits 65 even with CODE_SIGNING_ALLOWED=NO.
      - name: Build
        shell: bash {0}  # no -e: we MUST run our diagnostic block on failure
        run: |
          set -o pipefail
          xcodebuild -scheme Stats -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build 2>&1 | tee /tmp/xcb-build.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" != "0" ]; then
            echo "::group::Last 400 lines of build log"
            tail -400 /tmp/xcb-build.log
            echo "::endgroup::"
            # Surface every error as a GH annotation — readable via public
            # check-runs annotations API (no auth required).
            grep -E "error:|FAILED|fatal|Code Sign" /tmp/xcb-build.log | head -50 | while read -r line; do
              esc=$(printf '%s' "$line" | sed 's/%/%25/g; s/\r/%0D/g')
              echo "::error::xcb: $esc"
            done
          fi
          exit $rc

      - name: Test
        run: |
          xcodebuild -scheme Stats \
            -destination 'platform=macOS,arch=arm64' \
            -only-testing:Tests/SensorsTests \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            test
